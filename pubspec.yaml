name: namaz_vakti
description: "Application de prière islamique pour la Turquie — Horaires officiels Diyanet"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo.png"
  adaptive_icon_background: "#0A1F14"
  adaptive_icon_foreground: "assets/Logo.png"
  

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/Logo.png
    - assets/lg.png
    - assets/villes_turquie.json
    - assets/animations/
